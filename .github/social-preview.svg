  <text x="122" y="222" fill="#35515a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="500">AI-native production systems and domain operating layers</text>

  <g fill="none" stroke="#1d2a2e" stroke-width="3">
